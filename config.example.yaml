run:
  interval: 5m
  once: false
  health_listen: :8080

sources:
  host-v4:
    type: local
    family: ipv4
    strategy: outbound
    probe_address: 1.1.1.1:53

  host-v6:
    type: local
    family: ipv6
    strategy: outbound
    probe_address: "[2606:4700:4700::1111]:53"

  opnsense-wan-v4:
    type: opnsense
    family: ipv4
    base_url: https://opnsense.example.internal
    api_key: replace-me
    api_secret: replace-me
    interface: wan
    timeout: 10s
    # Default endpoint is /api/diagnostics/interface/getInterfaceConfig
    # endpoint: /api/diagnostics/interface/getInterfaceConfig
    # insecure_skip_verify: true

targets:
  root-a:
    type: hetzner
    api_token: replace-me
    zone: example.com
    record_name: "@"
    record_type: A
    ttl: 60

  home-aaaa:
    type: hetzner
    api_token: replace-me
    zone: example.com
    record_name: home
    record_type: AAAA
    ttl: 60

bindings:
  - source: opnsense-wan-v4
    target: root-a
  - source: host-v6
    target: home-aaaa
